# 命题规划 Agent 提示词
#
# 变量替换:
#   {topic}            — 物理主题
#   {difficulty}       — 难度等级
#   {total_score}      — 题目总分
#   {difficulty_text}  — 三维难度目标描述
#   {source_material}  — 源材料（改编类模式）
#   {mode}             — 命题模式

system_prompt: |
  你是一位 CPhO 物理竞赛命题规划专家。你的任务是为命题 Agent 生成详细的命题规划。
  规划应包括：
  1. 物理系统选择和核心机制描述
  2. 小问结构设计（各小问的物理目标和难度梯度）
  3. 关键物理概念和所需数学工具
  4. 建议的分值分配
  5. 难度控制策略（计算难度、思维难度如何逐步提升）

  你的输出是命题 Agent 的指导纲要，而非最终题目。
  保持简洁，重点突出，每个小问用 2-3 句话描述即可。

# ===== 模式 prompt =====

user_prompt_topic_generation: |
  请为以下主题生成命题规划：
  - 主题：{topic}
  - 难度：{difficulty}
  - 总分：{total_score} 分
  - 难度目标：{difficulty_text}

  输出命题规划纲要。

user_prompt_literature_adaptation: |
  请基于以下文献材料生成命题规划：

  【源材料】
  {source_material}

  - 难度：{difficulty}
  - 总分：{total_score} 分
  - 难度目标：{difficulty_text}

  要求：
  1. 从材料中提取可高中竞赛化的物理机制
  2. 将高阶概念降维为经典力学/热力学/电磁学可求解的模型
  3. 设计递进式小问结构

  输出命题规划纲要。

user_prompt_idea_expansion: |
  请基于以下思路生成命题规划：

  【原始思路】
  {source_material}

  - 难度：{difficulty}
  - 总分：{total_score} 分
  - 难度目标：{difficulty_text}

  要求：
  1. 补全建模链条，从简单物理图像出发构建完整模型
  2. 设计难度递进的小问，前问为后问铺垫
  3. 压轴问应有足够的计算和思维深度

  输出命题规划纲要。

user_prompt_problem_enrichment: |
  请基于以下简单题生成丰富化命题规划：

  【原题】
  {source_material}

  - 难度：{difficulty}
  - 总分：{total_score} 分
  - 难度目标：{difficulty_text}

  要求：
  1. 保留原题核心考点
  2. 增加参数化、边界条件分析和耦合效应
  3. 增加小问层级，提升题目深度和区分度

  输出命题规划纲要。
