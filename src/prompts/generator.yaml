# ============================================================
# 分数段命题规模引导（由 generator.py 根据 total_score 自动选择）
# ============================================================
score_guidance_low: |
  本题总分为 {total_score} 分，属于小题量级别，请按以下要求控制命题规模：
  - 小问数量：2-3 个，每个小问目标明确、推导简洁
  - 复杂度：以物理图像建立和基本方程推导为主，不需要复杂的多级微扰分析或大量级数运算
  - 题干篇幅：简明扼要地设定物理情境，3-5 个关键条件即可
  - 难度梯度：小问之间梯度适中，最后一问可涉及少量微积分或极限分析
  - 绝对禁止将题目设计得过于庞大，小题量题目应当精练而非庞杂

score_guidance_mid: |
  本题总分为 {total_score} 分，属于标准题量级别，请按以下要求控制命题规模：
  - 小问数量：3-4 个，各小问之间有明确的逻辑递进关系
  - 复杂度：包含完整的物理建模、方程推导和中等难度的数学运算（微分方程、积分、小量展开等）
  - 题干篇幅：中等篇幅，充分描述物理情境和约束条件
  - 难度梯度：从基础物理分析起步，逐步过渡到需要较深入推导的问题
  - 可使用二级小问 (N.M) 对较复杂的小问进行分解

score_guidance_high: |
  本题总分为 {total_score} 分，属于大题量级别，请按以下要求控制命题规模：
  - 小问数量：4-5 个，包含多层级结构，形成完整的物理问题链
  - 复杂度：要求大量计算，包括复杂微分方程、多重积分、微扰展开、极限分析、多物理场耦合等深度推导
  - 题干篇幅：充分铺陈复杂的物理情境、多个约束条件和精密的几何结构
  - 难度梯度：大跨度梯度上升，从基础物理图像模型建立最终到达需要深入分析的问题
  - 允许使用 Part（A. B. C.）划分独立部分，充分利用二级 (N.M) 和三级 (N.M.K) 小问细化解题过程
